# Static React + API gateway (Sprint 16 — multi-backend cutover routes).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location /rag/ {
        proxy_pass http://host.docker.internal:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
    }

    location /api/configure {
        proxy_pass http://host.docker.internal:8017;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /api/orchestrate {
        proxy_pass http://host.docker.internal:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /api/modes {
        proxy_pass http://host.docker.internal:8012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/agents {
        proxy_pass http://host.docker.internal:8012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/pressure {
        proxy_pass http://host.docker.internal:8013;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/mlx/ {
        proxy_pass http://host.docker.internal:8010/api/mlx/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /api/mlx/stream {
        proxy_pass http://host.docker.internal:8010/api/architect/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:8010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
